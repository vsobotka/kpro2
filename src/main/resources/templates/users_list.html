<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User List</title>
</head>
<body>

<h1>User List</h1>

<a th:href="@{/users/create}">Create a New User</a>
<br><br>

<ul>
    <li th:each="user: ${users}">
        <a th:href="@{'/users/' + ${user.id}}" th:text="${user.name}"></a>
    </li>
</ul>

</body>
</html>
